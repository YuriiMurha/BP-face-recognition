# Vision Models Configuration
# This file defines available detection and recognition models with their configurations

detectors:
  mediapipe_v1:
    class: "vision.detection.mediapipe.MediaPipeDetector"
    model_file: "vision/detection/models/blaze_face_short_range.tflite"
    version: "1.0"
    description: "MediaPipe BlazeFace detection with GPU acceleration support"
    default_config:
      min_detection_confidence: 0.5
      use_gpu: false
      auto_gpu_detection: true
  
  mtcnn_v1:
    class: "vision.detection.mtcnn.MTCNNDetector"
    version: "1.0"
    description: "Multi-task Cascaded Convolutional Networks"
    default_config:
      thresholds: [0.6, 0.7, 0.8]
      min_face_size: 20
  
  haar_v1:
    class: "vision.detection.haar_cascade.HaarCascadeDetector"
    version: "1.0"
    description: "OpenCV Haar Cascade classifier"
    default_config:
      scale_factor: 1.1
      min_neighbors: 5
      min_size: [30, 30]
  
  dlib_hog_v1:
    class: "vision.detection.dlib_hog.DlibHOGDetector"
    version: "1.0"
    description: "dlib Histogram of Oriented Gradients detector"
    default_config:
      upsample_times: 1
  
  face_recognition_lib_v1:
    class: "vision.detection.face_recognition_lib.FaceRecognitionLibDetector"
    version: "1.0"
    description: "Python face_recognition library detector"
    default_config:
      model: "hog"

recognizers:
  efficientnetb0_baseline:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "vision/recognition/models/efficientnetb0_seccam_2_cpu_baseline_v1.0.keras"
    version: "1.0"
    description: "EfficientNetB0 baseline model - 76.67% accuracy, 19.8MB"
    metadata:
      accuracy: 0.7667
      model_size: "19.8MB"
      training_dataset: "seccam_2"
      training_platform: "CPU"
      quantization: "none"
      purpose: "production_research"
      paradigm: "closed-set"
    default_config:
      input_size: [224, 224]
      normalize: true
  
  efficientnetb0_quantized:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "vision/recognition/models/efficientnetb0_seccam_2_cpu_quantized_v1.0.tflite"
    version: "1.0"
    description: "EfficientNetB0 quantized model - ~75% accuracy, 5.0MB (73.6% compression)"
    metadata:
      accuracy: 0.75
      model_size: "5.0MB"
      compression_ratio: "73.6%"
      training_dataset: "seccam_2"
      training_platform: "CPU"
      quantization: "dynamic_range"
      purpose: "production_optimized"
      paradigm: "closed-set"
    default_config:
      input_size: [224, 224]
      normalize: true
  
  efficientnetb0_best:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "vision/recognition/models/efficientnetb0_seccam_2_cpu_best_v1.0.keras"
    version: "1.0"
    description: "EfficientNetB0 best checkpoint - ~78% accuracy, 54MB"
    metadata:
      accuracy: 0.78
      model_size: "54MB"
      training_dataset: "seccam_2"
      training_platform: "CPU"
      quantization: "none"
      checkpoint_type: "best_validation"
      purpose: "benchmark_research"
      paradigm: "closed-set"
    default_config:
      input_size: [224, 224]
      normalize: true
  
  facenet_baseline_comparison:
    class: "vision.recognition.facenet.FaceNetRecognizer"
    model_file: "vision/recognition/models/facenet_keras_baseline_comparison_v0.1.h5"
    version: "0.1"
    description: "FaceNet model for performance comparison - 88MB"
    metadata:
      accuracy: "pretrained_baseline"
      model_size: "88MB"
      purpose: "baseline_comparison"
      training_dataset: "pretrained"
      paradigm: "open-set"
    default_config:
      input_size: [160, 160]
      normalize: true
  
  # GPU-trained models (Feb 2026)
  efficientnetb0_webcam_gpu:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "bp_face_recognition/models/efficientnetb0_webcam_gpu_final.keras"
    version: "1.0"
    description: "EfficientNetB0 webcam model - GPU trained, 100% accuracy, 24MB"
    metadata:
      accuracy: 1.0
      model_size: "24MB"
      training_dataset: "webcam"
      training_platform: "GPU"
      quantization: "none"
      purpose: "production_gpu"
      paradigm: "closed-set"
    default_config:
      input_size: [224, 224]
      normalize: true
  
  efficientnetb0_webcam_gpu_quantized:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "bp_face_recognition/models/efficientnetb0_webcam_gpu_final_float16.tflite"
    version: "1.0"
    description: "EfficientNetB0 webcam model - GPU trained, float16 quantized, 9.4MB (62% compression)"
    metadata:
      accuracy: 1.0
      model_size: "9.4MB"
      compression_ratio: "62%"
      training_dataset: "webcam"
      training_platform: "GPU"
      quantization: "float16"
      purpose: "realtime"
      paradigm: "closed-set"
    default_config:
      input_size: [224, 224]
      normalize: true
  
  efficientnetb0_seccam_2_gpu:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "bp_face_recognition/models/efficientnetb0_seccam_2_gpu_final.keras"
    version: "1.0"
    description: "EfficientNetB0 seccam_2 model - GPU trained, 100% accuracy, 24MB (15 classes)"
    metadata:
      accuracy: 1.0
      model_size: "24MB"
      training_dataset: "seccam_2"
      training_platform: "GPU"
      quantization: "none"
      num_classes: 15
      purpose: "production_gpu"
      paradigm: "closed-set"
    default_config:
      input_size: [224, 224]
      normalize: true
  
  efficientnetb0_seccam_2_gpu_quantized:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "bp_face_recognition/models/efficientnetb0_seccam_2_gpu_final_float16.tflite"
    version: "1.0"
    description: "EfficientNetB0 seccam_2 model - GPU trained, float16 quantized, 9.4MB (62% compression)"
    metadata:
      accuracy: 1.0
      model_size: "9.4MB"
      compression_ratio: "62%"
      training_dataset: "seccam_2"
      training_platform: "GPU"
      quantization: "float16"
      num_classes: 15
      purpose: "realtime"
      paradigm: "closed-set"
    default_config:
      input_size: [224, 224]
      normalize: true
  
  efficientnetb0_seccam_gpu:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "bp_face_recognition/models/efficientnetb0_seccam_gpu_final.keras"
    version: "1.0"
    description: "EfficientNetB0 seccam model - GPU trained, 100% accuracy, 24MB"
    metadata:
      accuracy: 1.0
      model_size: "24MB"
      training_dataset: "seccam"
      training_platform: "GPU"
      quantization: "none"
      purpose: "production_gpu"
      paradigm: "closed-set"
    default_config:
      input_size: [224, 224]
      normalize: true
  
  efficientnetb0_seccam_gpu_quantized:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "bp_face_recognition/models/efficientnetb0_seccam_gpu_final_float16.tflite"
    version: "1.0"
    description: "EfficientNetB0 seccam model - GPU trained, float16 quantized, 9.4MB (62% compression)"
    metadata:
      accuracy: 1.0
      model_size: "9.4MB"
      compression_ratio: "62%"
      training_dataset: "seccam"
      training_platform: "GPU"
      quantization: "float16"
      purpose: "realtime"
      paradigm: "closed-set"
    default_config:
      input_size: [224, 224]
      normalize: true

  efficientnetb0_feature_extractor:
    class: "vision.recognition.tflite_recognizer.TFLiteRecognizer"
    model_file: "bp_face_recognition/models/efficientnetb0_feature_extractor_float16.tflite"
    version: "1.0"
    description: "EfficientNetB0 feature extractor - 512D embeddings, float16 quantized"
    metadata:
      model_size: "9.4MB"
      quantization: "float16"
      purpose: "face_recognition"
      paradigm: "open-set"
    default_config:
      input_size: [224, 224]
      normalize: true

  dlib_v1:
    class: "vision.recognition.dlib_recognizer.DlibRecognizer"
    version: "1.0"
    description: "Dlib-based high accuracy face recognition (ResNet-34)"
    metadata:
      library: "face_recognition"
      embedding_size: 128
      purpose: "production"
      paradigm: "open-set"
    default_config:
      input_size: [160, 160]
      normalize: true

  # Custom Metric Learning Models (Open-Set, Triplet Loss)
  metric_efficientnetb0_128d:
    class: "vision.recognition.keras_metric_recognizer.KerasMetricRecognizer"
    model_file: "bp_face_recognition/models/metric_efficientnetb0_128d_final.keras"
    weights_file: "bp_face_recognition/models/metric_efficientnetb0_128d.weights.h5"
    version: "1.0"
    description: "Custom EfficientNetB0 metric learning - 128D embeddings, Triplet Loss"
    metadata:
      model_size: "~24MB"
      embedding_size: 128
      training_dataset: "triplet_gallery (LFW subset)"
      backbone: "EfficientNetB0"
      loss: "Triplet Loss"
      purpose: "custom_model_testing"
      paradigm: "open-set"
    default_config:
      input_size: [224, 224]
      normalize: true
      backbone: "EfficientNetB0"
      embedding_dim: 128

# Global settings
global:
  default_detector: "mediapipe_v1"
  default_recognizer: "metric_efficientnetb0_128d"  # Custom-trained metric model (20 epochs, lfw+webcam+seccam)
  auto_fallback: true
  max_retry_attempts: 3
  log_level: "INFO"
  auto_environment_detection: true

# Environment-specific configurations
environments:
  # Core Profiles
  wsl_development:
    detector: "mediapipe_v1"
    recognizer: "efficientnetb0_baseline"
    use_gpu: true
    auto_gpu_detection: true
    log_level: "DEBUG"
    
  wsl_production:
    detector: "mediapipe_v1"
    recognizer: "efficientnetb0_quantized"
    use_gpu: true
    auto_gpu_detection: true
    log_level: "INFO"
    
  windows_development:
    detector: "haar_v1"
    recognizer: "facenet_baseline_comparison"
    use_gpu: false
    auto_gpu_detection: false
    log_level: "DEBUG"
    
  windows_production:
    detector: "mediapipe_v1"
    recognizer: "efficientnetb0_quantized"
    use_gpu: false
    auto_gpu_detection: false
    log_level: "INFO"
    
  # Specialized Profiles
  benchmarking:
    detector: "dlib_hog_v1"
    recognizer: "efficientnetb0_best"
    use_gpu: false
    auto_gpu_detection: false
    log_level: "INFO"
    
  testing:
    detector: "haar_v1"
    recognizer: "facenet_baseline_comparison"
    use_gpu: false
    auto_gpu_detection: false
    log_level: "DEBUG"
    
  performance_demo:
    detector: "mediapipe_v1"
    recognizer: "efficientnetb0_best"
    use_gpu: true
    auto_gpu_detection: true
    log_level: "WARNING"
    
  research:
    detector: "mediapipe_v1"
    recognizer: "efficientnetb0_baseline"
    use_gpu: true
    auto_gpu_detection: true
    log_level: "INFO"
    
  # Specialized for real-time face recognition (Feb 2026)
  realtime:
    detector: "mediapipe_v1"
    recognizer: "efficientnetb0_webcam_gpu_quantized"
    use_gpu: true
    auto_gpu_detection: true
    log_level: "WARNING"
    
  realtime_seccam_2:
    detector: "mediapipe_v1"
    recognizer: "efficientnetb0_seccam_2_gpu_quantized"
    use_gpu: true
    auto_gpu_detection: true
    log_level: "WARNING"
    
  realtime_seccam:
    detector: "mediapipe_v1"
    recognizer: "efficientnetb0_seccam_gpu_quantized"
    use_gpu: true
    auto_gpu_detection: true
    log_level: "WARNING"

  # Custom Model Testing (Metric Learning)
  custom_metric_test:
    detector: "mediapipe_v1"
    recognizer: "metric_efficientnetb0_128d"
    use_gpu: true
    auto_gpu_detection: true
    log_level: "INFO"

# Performance optimization settings
optimization:
  enable_quantization: false
  quantization_type: "dynamic_range"
  enable_gpu_acceleration: true
  fallback_on_gpu_error: true